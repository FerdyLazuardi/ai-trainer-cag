services:
  api:
    build: .
    container_name: cag-lms-api
    ports:
      - "8011:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_PORT: "8000"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      POSTGRES_POOL_SIZE: "4"
      POSTGRES_MAX_OVERFLOW: "4"
      MAX_CONCURRENT_PIPELINES: "8"
      WEB_CONCURRENCY: "${WEB_CONCURRENCY:-1}"
      RETRIEVAL_MODE: cag
      CAG_KB_SOURCE: moodle
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/.venv
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/readyz',timeout=3).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 3
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "${WEB_CONCURRENCY:-1}"]

  worker:
    build: .
    container_name: cag-lms-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      POSTGRES_POOL_SIZE: "2"
      POSTGRES_MAX_OVERFLOW: "2"
      RETRIEVAL_MODE: cag
      CAG_KB_SOURCE: moodle
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/.venv
      - ./logs:/app/logs
    command: ["streaq", "run", "app.worker:worker"]

  postgres:
    image: postgres:16
    container_name: cag-lms-postgres
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-cag_lms}"
      POSTGRES_USER: "${POSTGRES_USER:-admin}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}"
    ports:
      - "5455:5432"
    volumes:
      - cag_lms_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d cag_lms"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6.3-alpine
    container_name: cag-lms-redis
    command: ["redis-server", "--maxmemory", "600mb", "--maxmemory-policy", "volatile-lru", "--maxmemory-samples", "10"]
    ports:
      - "6391:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  cag_lms_postgres_data:
